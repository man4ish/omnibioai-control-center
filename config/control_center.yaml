services:
  mysql:
    type: mysql
    host: mysql
    port: 3306

  redis:
    type: redis
    host: redis
    port: 6379

  toolserver:
    type: http
    url: http://toolserver:9090/health
    timeout_s: 2
    ui_url: http://127.0.0.1:9090

  tes:
    type: http
    url: http://omnibioai-tes:8081/health
    timeout_s: 2
    ui_url: http://127.0.0.1:8081

  omnibioai:
    type: http
    url: http://omnibioai-workbench:8001/health/
    timeout_s: 2
    ui_url: http://127.0.0.1:8001

  lims-x:
    type: http
    url: http://lims-x:7000/
    timeout_s: 2
    ui_url: http://127.0.0.1:7000/core/

  model-registry:
    type: http
    url: http://model-registry:8095/health
    timeout_s: 2
    ui_url: http://127.0.0.1:8095

system:
  disk_checks:
    - path: /workspace/out
      warn_pct_free_below: 15
    - path: /workspace/tmpdata
      warn_pct_free_below: 10
    - path: /workspace/local_registry
      warn_pct_free_below: 10
