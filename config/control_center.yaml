services:
  mysql:
    type: mysql
    host: mysql
    port: 3306
  redis:
    type: redis
    host: redis
    port: 6379
  toolserver:
    type: http
    url: http://toolserver:9090/health
    timeout_s: 2
    ui_url: http://192.168.86.234:9090
  tes:
    type: http
    url: http://tes:8081/health
    timeout_s: 2
    ui_url: http://192.168.86.234:8081
  workbench:
    type: http
    url: http://workbench:8000/health/
    timeout_s: 2
    ui_url: http://192.168.86.234:8000
  lims:
    type: http
    url: http://lims:7000/accounts/login/
    timeout_s: 2
    ui_url: http://192.168.86.234:7000
  model-registry:
    type: http
    url: http://model-registry:8095/health
    timeout_s: 2
    ui_url: http://192.168.86.234:8095
system:
  disk_checks:
    - path: /workspace
      warn_pct_free_below: 15
